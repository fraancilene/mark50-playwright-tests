name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install web dependencies
        working-directory: apps/web
        run: yarn install --frozen-lockfile

      - name: Install api dependencies
        working-directory: apps/api
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Prepare api database
        working-directory: apps/api
        run: yarn db:init

      - name: Start web and api
        env:
          BASE_URL: http://localhost:3000
          BASE_API: http://localhost:3333
        run: |
          cd apps/web
          yarn dev > ../../web.log 2>&1 &
          cd ../api
          yarn dev > ../../api.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:3333/health >/dev/null; then
              echo "Services are online"
              exit 0
            fi
            sleep 2
          done
          echo "Web log:"
          cat web.log || true
          echo "API log:"
          cat api.log || true
          exit 1

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:3000
          BASE_API: http://localhost:3333
        run: npx playwright test
      
      - name: Publish HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: service-logs
          path: |
            web.log
            api.log
          retention-days: 30
